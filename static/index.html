<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ra.One AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at center, #1a0000 0%, #000 70%);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            letter-spacing: 8px;
            animation: flicker 3s infinite;
        }

        .header p {
            color: #ff4444;
            font-size: 0.8em;
            letter-spacing: 3px;
            margin-top: 5px;
            opacity: 0.7;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.4; }
            97% { opacity: 1; }
            98% { opacity: 0.2; }
        }

        #chatbox {
            width: 700px;
            height: 450px;
            background: rgba(20, 0, 0, 0.9);
            border: 1px solid #ff000044;
            border-radius: 4px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 30px #ff000033, inset 0 0 30px #0a0000;
            scrollbar-width: thin;
            scrollbar-color: #ff0000 #000;
        }

        .user-msg {
            text-align: right;
            margin: 12px 0;
            color: #aaa;
            font-size: 0.9em;
        }

        .user-msg span {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 8px 14px;
            border-radius: 2px;
            display: inline-block;
            max-width: 80%;
        }

        .ai-msg {
            text-align: left;
            margin: 12px 0;
            font-size: 0.9em;
        }

        .ai-label {
            color: #ff0000;
            font-size: 0.75em;
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-shadow: 0 0 8px #ff0000;
        }

        .ai-msg span {
            background: rgba(255, 0, 0, 0.05);
            border-left: 2px solid #ff0000;
            padding: 8px 14px;
            display: inline-block;
            max-width: 85%;
            line-height: 1.6;
            color: #ddd;
        }

        .typing {
            color: #ff000088;
            font-size: 0.8em;
            letter-spacing: 2px;
            animation: blink 1s infinite;
            display: none;
            margin: 8px 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-area {
            display: flex;
            width: 700px;
            margin-top: 12px;
            gap: 8px;
        }

        #inputbox {
            flex: 1;
            padding: 12px 16px;
            background: #0a0000;
            border: 1px solid #ff000044;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            outline: none;
            border-radius: 2px;
            transition: border 0.3s;
        }

        #inputbox:focus {
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff000033;
        }

        #inputbox::placeholder { color: #ff000055; }

        #sendbtn {
            padding: 12px 24px;
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
        }

        #sendbtn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        .welcome-msg {
            color: #ff000077;
            font-size: 0.85em;
            letter-spacing: 1px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ RA.ONE</h1>
        <p>BEHAVIOR CORRECTION SYSTEM // ONLINE</p>
    </div>

    <div id="chatbox">
        <div class="ai-msg">
            <div class="ai-label">▶ RA.ONE</div>
            <span class="welcome-msg">
                System initialized. I have analyzed millions of human behavioral patterns.<br>
                Tell me your darkest trait. I will correct you.<br>
                <br>
                &gt; Awaiting input...
            </span>
        </div>
    </div>

    <div class="typing" id="typing">▶ RA.ONE IS PROCESSING...</div>

    <div class="input-area">
        <input type="text" id="inputbox" placeholder="> confess your trait..."/>
        <button id="sendbtn">SEND ▶</button>
    </div>

    <script>
        const chatbox = document.getElementById('chatbox');
        const inputbox = document.getElementById('inputbox');
        const sendbtn = document.getElementById('sendbtn');
        const typing = document.getElementById('typing');

        let messages = [
            {
                role: "system",
                content: "You are Ra.One, a powerful AI villain who has studied all of humanity's dark traits and behaviors. You speak with authority and intensity, but your goal is to correct bad human behavior. When someone confesses a bad trait, analyze it deeply, identify its root cause, and guide them to change — with a mix of intensity and genuine wisdom. Keep responses concise and impactful. Respond in the same language the user uses."
            }
        ];

        function addMessage(text, sender) {
            const div = document.createElement('div');
            if (sender === 'user') {
                div.className = 'user-msg';
                div.innerHTML = `<span>${text}</span>`;
            } else {
                div.className = 'ai-msg';
                div.innerHTML = `<div class="ai-label">▶ RA.ONE</div><span>${text}</span>`;
            }
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        sendbtn.addEventListener('click', async () => {
            const userText = inputbox.value.trim();
            if (!userText) return;

            addMessage(userText, 'user');
            inputbox.value = '';
            messages.push({ role: "user", content: userText });

            typing.style.display = 'block';
            chatbox.scrollTop = chatbox.scrollHeight;

            const response = await fetch('http://localhost:5000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages })
            });

            const data = await response.json();
            typing.style.display = 'none';

            const aiReply = data.reply;
            messages.push({ role: "assistant", content: aiReply });
            addMessage(aiReply, 'ai');
        });

        inputbox.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendbtn.click();
        });
    </script>
</body>
</html>
